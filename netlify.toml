[build]
  command = "npm install && node build-blog.js"
  publish = "."

[[redirects]]
  from = "/blog"
  to = "/blog.html"
  status = 301

[[redirects]]
  from = "/blog/"
  to = "/blog.html"
  status = 301

[[redirects]]
  from = "/blog/index.html"
  to = "/blog.html"
  status = 301

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# Note: www→non-www canonicalization is handled in Netlify dashboard domain settings
